<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Customer Info Messenger - Settings</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        width: 360px;
      }
      h3 {
        margin-top: 0;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 13px;
        margin-bottom: 10px;
      }
      button {
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      #status {
        display: inline-block;
        margin-left: 8px;
        font-size: 12px;
        color: #2e7d32;
      }
      .hint {
        font-size: 12px;
        color: #65676b;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h3>ManyChat API Token</h3>
    <p class="hint">
      Used to search ManyChat subscribers by name when looking up a
      customer's PSID.
    </p>
    <label for="token">API Token</label>
    <input type="password" id="token" autocomplete="off" />

    <h3>Baserow</h3>
    <p class="hint">
      Used to write the linked UID into the "Users" table when a customer is
      linked or unlinked from a ManyChat candidate.
    </p>
    <label for="baserowBaseUrl">Base URL</label>
    <input type="text" id="baserowBaseUrl" autocomplete="off" value="https://baserow.dd-herbs.com" />
    <label for="baserowToken">API Token</label>
    <input type="password" id="baserowToken" autocomplete="off" />
    <label for="baserowUsersTableId">Users Table ID</label>
    <input type="text" id="baserowUsersTableId" autocomplete="off" value="749" />
    <label for="baserowOrdersTableId">Orders Table ID</label>
    <input type="text" id="baserowOrdersTableId" autocomplete="off" value="750" />

    <button id="save">Save</button>
    <span id="status"></span>
    <script src="options.js"></script>
  </body>
</html>
